volumes:
  paingouin_prod_rabbitmq_data: {}

services:
  django: &django
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: paingouin_prod_django
    ports:
      - 8000:8000 # app server port
    volumes:
      - ../media:/app/media
    environment:
      DEBUG: 0 # Should be set to 0 in production !
      PROD: 1
      DJANGO_ALLOWED_HOSTS: 127.0.0.1, localhost
      DJANGO_CSRF_TRUSTED_ORIGINS: "https://paingouin.rezoleo.fr"
      ENFORCE_HTTPS: 1 # Should be set to 1 in production !
      DATABASE_ENGINE: mysql
      DATABASE_NAME: dbdjango
      DATABASE_USERNAME: myuser
      DATABASE_PASSWORD: monpassword
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 3306
      EMAIL_USE_TLS:
      EMAIL_USE_SSL:
      EMAIL_HOST:
      EMAIL_PORT:
      EMAIL_HOST_USER: example@email.com
      EMAIL_HOST_PASSWORD: ""
      RABBITMQ_USER: paingouin
      RABBITMQ_PASS: xGmyRq8J5CSUT0fgD3m9iGgVs
      RABBITMQ_VHOST: paingouinvhost
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      HELLOASSO_CLIENT_ID:
      HELLOASSO_CLIENT_SECRET:
      HELLOASSO_ORG_SLUG: pain-gouin
    depends_on:
      - rabbitmq

  celeryworker:
    <<: *django
    container_name: paingouin_prod_celeryworker
    ports: []
    volumes: []
    entrypoint: celery -A paingouin worker --loglevel=INFO -B --concurrency=2
    depends_on:
      - rabbitmq

  # brocker like redis, for celery
  rabbitmq:
    image: rabbitmq:4.1.3
    container_name: paingouin_prod_rabbitmq
    restart: always
    volumes:
      - paingouin_prod_rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: paingouin
      RABBITMQ_DEFAULT_PASS: xGmyRq8J5CSUT0fgD3m9iGgVs
      RABBITMQ_DEFAULT_VHOST: paingouinvhost
