name: Vérification manuelle du site de prod

on:
  pull_request:
    types: [opened]
    branches:
      - prod
  issue_comment:
    types: [created]
    branches:
      - prod

jobs:
  instructions:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment test instructions
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `### 🚀 Validation de Production Requise\n\nCette PR cible la branche **prod**. Une vérification manuelle est obligatoire.\n\n1. 🔗 Testez les changements sur l'[environnement de staging](https://paingouindev.rezoleo.fr).\n2. ✅ Si tout est OK, commentez avec :\n\n\`/tested\`\n\n*Le check **Site dev testé** passera alors au vert.*`
            })

  approve-test:
    # Only run if the comment is "/tested" and it's on a Pull Request
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/tested')
    runs-on: ubuntu-latest
    steps:
      - name: Create Success Check
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Site dev testé',
              head_sha: (await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              })).data.head.sha,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'Site dev testé',
                summary: `Vérifié par @${context.payload.sender.login}`
              }
            })
