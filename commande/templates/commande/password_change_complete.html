{% extends "commande/base.html" %}

{% load static %}

{% block content %}
  <div class="flex flex-row  place-content-center py-4 px-2">
    <div id="alert-1"
         class="flex items-center p-4 mb-4 text-green-800 border border-green-400 rounded-lg bg-green-50"
         role="alert">
      <svg class="shrink-0 w-4 h-4"
           aria-hidden="true"
           xmlns="http://www.w3.org/2000/svg"
           fill="currentColor"
           viewBox="0 0 20 20">
        <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z" />
      </svg>
      <span class="sr-only">Info</span>
      <div class="ms-3 font-medium">Le mot de passe a bien été changé.</div>
    </div>
  </div>
  <div class="flex justify-center flex-row py-10 px-2">
    <a href="{% url 'login' %}" class="w-96">
      <button type="button"
              class="h-12 w-full bg-inherit border-primary text-primary font-montserrat rounded-lg inline-block box-border border-2 rounded-x1 hover:bg-primary hover:text-white duration-100 font-bold align-middle">
        Se connecter
      </button>
    </a>
  </div>
{% endblock content %}
