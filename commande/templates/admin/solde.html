{% extends "unfold/layouts/base.html" %}

{% load static %}
{% load static tailwind_tags %}

{% block content %}
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>

<body>

    <h1 class="text-center">Rechercher un Utilisateur</h1>
    <form id="user-form">
        <input type="text" id="user-name" placeholder="Prénom Nom">
        <button type="submit">Rechercher</button>
    </form>
    <div id="user-solde"></div>
    <div id="credit-form-container" style="display: none;">
        <h2 class="text-center">Modifier le Crédit de l'Utilisateur</h2>
        <form id="credit-form">
            <input type="hidden" id="user-first-name">
            <input type="hidden" id="user-last-name">
            <label for="new-credit">Nouveau Crédit :</label>
            <input type="number" id="new-credit" name="new-credit">
            <button type="submit">Modifier</button>
        </form>
        <div id="update-message"></div>
    </div>

    <div id="add-credit-form-container" style="display: none;">
        <h2 class="text-center">Ajouter des Crédits à l'Utilisateur</h2>
        <form id="add-credit-form">
            <input type="hidden" id="user-first-name-add">
            <input type="hidden" id="user-last-name-add">
            <label for="add-credit">Crédit à ajouter :</label>
            <input type="number" id="add-credit" name="add-credit">
            <button type="submit">Ajouter</button>
        </form>
        <div id="add-update-message"></div>
    </div>

    <script>
        $(function() {
            $("#user-name").autocomplete({
                source: "/admin/auth/group/solde/autocomplete_user/",
                minLength: 2
            });

            $('#user-form').on('submit', function(e) {
                e.preventDefault();
                var fullName = $('#user-name').val().split(' ');
                if (fullName.length < 2) {
                    alert('Veuillez entrer à la fois le prénom et le nom de famille.');
                    return;
                }
                var firstName = fullName[0];
                var lastName = fullName[1];

                $.ajax({
                    url: "/admin/auth/group/solde/get_user_solde/",
                    data: {
                        'first_name': firstName,
                        'last_name': lastName
                    },
                    success: function(data) {
                        $('#user-solde').text('Crédit: ' + data.solde + ' €');
                        $('#user-first-name').val(firstName);
                        $('#user-last-name').val(lastName);
                        $('#user-first-name-add').val(firstName);
                        $('#user-last-name-add').val(lastName);
                        $('#credit-form-container').show();  // Afficher le formulaire de crédit
                        $('#add-credit-form-container').show();  // Afficher le formulaire d'ajout de crédit
                    },
                    error: function(xhr, status, error) {
                        $('#user-solde').text('Utilisateur non trouvé ou erreur dans la requête.');
                        $('#credit-form-container').hide();  // Masquer le formulaire de crédit
                        $('#add-credit-form-container').hide();  // Masquer le formulaire d'ajout de crédit
                    }
                });
            });

            $('#credit-form').on('submit', function(e) {
                e.preventDefault();
                var firstName = $('#user-first-name').val();
                var lastName = $('#user-last-name').val();
                var newCredit = $('#new-credit').val();

                $.ajax({
                    url: "/admin/auth/group/solde/update_credit/",
                    method: "POST",
                    data: {
                        'first_name': firstName,
                        'last_name': lastName,
                        'new_credit': newCredit,
                        'csrfmiddlewaretoken': '{{ csrf_token }}'
                    },
                    success: function(data) {
                        $('#update-message').text('Crédit mis à jour avec succès.');
                    },
                    error: function(xhr, status, error) {
                        $('#update-message').text('Erreur lors de la mise à jour du crédit.');
                    }
                });
            });

            $('#add-credit-form').on('submit', function(e) {
                e.preventDefault();
                var firstName = $('#user-first-name-add').val();
                var lastName = $('#user-last-name-add').val();
                var addCredit = $('#add-credit').val();

                $.ajax({
                    url: "/admin/auth/group/solde/add_credit/",
                    method: "POST",
                    data: {
                        'first_name': firstName,
                        'last_name': lastName,
                        'add_credit': addCredit,
                        'csrfmiddlewaretoken': '{{ csrf_token }}'
                    },
                    success: function(data) {
                        $('#add-update-message').text('Crédit ajouté avec succès.');
                        $('#user-solde').text('Crédit: ' + data.new_solde + ' €');
                    },
                    error: function(xhr, status, error) {
                        $('#add-update-message').text('Erreur lors de l\'ajout du crédit.');
                    }
                });
            });
        });
    </script>
</body>
{% endblock %}
